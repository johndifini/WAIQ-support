name: Bug report
description: Something in WAIQ isn't working right
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect instead?
      placeholder: The DJ stopped speaking after the third song…
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go live with a station
        2. Lock the screen
        3. …
    validations:
      required: false
  - type: input
    id: device
    attributes:
      label: iPhone model
      placeholder: iPhone 17 Pro
    validations:
      required: true
  - type: input
    id: ios-version
    attributes:
      label: iOS version
      placeholder: iOS 26.1
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Apple Music
        - Demo
    validations:
      required: true
