name: Feature request
description: An idea to make WAIQ better
title: "[Idea] "
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like WAIQ to do?
      placeholder: I'd love the DJ to…
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why would this be useful?
    validations:
      required: false
